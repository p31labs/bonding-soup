# After **P31 CI** succeeds on a **push** to `main` / `master`, rebuild hub (skip duplicate root verify) and deploy **p31ca** to Cloudflare Pages when **`CLOUDFLARE_API_TOKEN`** is set.
# Skips quietly when **`andromeda/04_SOFTWARE/p31ca`** is absent (home-only CI checkout).
#
# Disable: repo **Variable** `P31_DISABLE_AUTODEPLOY` = `true` or `1`.
# Manual + optional smoke: still **P31 Pages deploy + prod smoke** workflow.
name: P31 autodeploy hub (main)

on:
  workflow_run:
    workflows: ["P31 CI"]
    types:
      - completed

concurrency:
  group: p31-autodeploy-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: P31 / autodeploy p31ca Pages
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: >
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
      && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
    steps:
      - name: Gate (var + secret)
        id: gate
        run: |
          if [ "${{ vars.P31_DISABLE_AUTODEPLOY }}" = "1" ] || [ "${{ vars.P31_DISABLE_AUTODEPLOY }}" = "true" ]; then
            echo "skip=var" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "skip=no-secret" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ok=1" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.gate.outputs.ok == '1'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ok == '1'
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Hub build (preflight CI already ran root verify)
        if: steps.gate.outputs.ok == '1'
        env:
          CI: "true"
        run: node scripts/p31-ci.mjs --skip-root-verify

      - name: Require hub dist
        if: steps.gate.outputs.ok == '1'
        run: |
          if [ ! -f andromeda/04_SOFTWARE/p31ca/dist/index.html ]; then
            echo "::notice::p31-autodeploy: no hub dist (partial clone / no andromeda) — skip deploy"
            exit 0
          fi
          echo "HAS_DIST=1" >> "$GITHUB_ENV"

      - name: Deploy to Cloudflare Pages
        if: steps.gate.outputs.ok == '1' && env.HAS_DIST == '1'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: andromeda/04_SOFTWARE/p31ca
        run: npx wrangler pages deploy dist --project-name p31ca --branch=main --commit-dirty=true

      - name: Post-deploy verify (smoke + strict glass + freshness)
        if: steps.gate.outputs.ok == '1' && env.HAS_DIST == '1'
        env:
          P31_POST_DEPLOY_WAIT: "60"
        run: node scripts/p31-post-deploy-verify.mjs
