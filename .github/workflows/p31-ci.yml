# P31 home: `p31:all` = CI chain + validate-p31-full + fleet (soft) + Playwright E2E + security:lint (soft) + Semgrep (soft).
# Default remote often omits gitignored andromeda/ — job still passes (home-only chain only).
# No path filters: every push/PR to main or master runs this workflow (cannot miss CI by file path).
# workflow_dispatch: manual. Ad-hoc: see package.json and docs/P31-ENGINEERING-STANDARD.md.
name: P31 CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: p31-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Semgrep CLI (p31:all SAST)
        if: ${{ hashFiles('andromeda/04_SOFTWARE/p31ca/package.json') != '' }}
        run: |
          python3 -m pip install --user semgrep || python3 -m pip install --user --break-system-packages semgrep
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: P31 all (CI + validate:full + fleet + e2e + lint + SAST)
        env:
          CI: "true"
          MESH_LIVE_STRICT: "1"
        run: node scripts/p31-all.mjs
