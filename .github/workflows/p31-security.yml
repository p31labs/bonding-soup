# P31 Security Suite — CI job
# Runs on push/PR to main + weekly schedule + manual dispatch.
# Policy: exits 1 on P0 only (unsuppressed prod-runtime vulns, broken PQC tests).
# P1 warnings are printed but don't block merges.
#
# bonding-soup remote often has NO andromeda/ in git — preflight job detects p31ca; security jobs skip (clean pass).
# Full proof: Andromeda p31ca-hub.yml + local npm run security:check. See docs/P31-RELEASE-LADDER-CI.md
#
# Required secrets (optional — job gracefully skips if absent):
#   CLOUDFLARE_API_TOKEN — for optional wrangler dry-run in future phases

name: P31 Security

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "andromeda/04_SOFTWARE/p31ca/scripts/security/**"
      - "andromeda/04_SOFTWARE/p31ca/security/**"
      - "andromeda/04_SOFTWARE/p31ca/workers/**"
      - "andromeda/04_SOFTWARE/p31ca/src/**"
      - "andromeda/04_SOFTWARE/p31ca/package.json"
      - "andromeda/04_SOFTWARE/p31ca/package-lock.json"
      - "andromeda/04_SOFTWARE/packages/quantum-core/**"
      - ".github/workflows/p31-security.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "andromeda/04_SOFTWARE/p31ca/scripts/security/**"
      - "andromeda/04_SOFTWARE/p31ca/security/**"
      - "andromeda/04_SOFTWARE/p31ca/workers/**"
      - "andromeda/04_SOFTWARE/p31ca/src/**"
      - "andromeda/04_SOFTWARE/p31ca/package.json"
      - "andromeda/04_SOFTWARE/p31ca/package-lock.json"
      - "andromeda/04_SOFTWARE/packages/quantum-core/**"
      - ".github/workflows/p31-security.yml"
  schedule:
    # Weekly on Monday 09:00 UTC — catches newly-disclosed CVEs against pinned deps
    - cron: "0 9 * * 1"

concurrency:
  group: p31-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    name: P31 / security preflight
    runs-on: ubuntu-latest
    outputs:
      has_p31ca: ${{ steps.detect.outputs.has_p31ca }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          if [ -f andromeda/04_SOFTWARE/p31ca/package.json ]; then
            echo "has_p31ca=true" >> $GITHUB_OUTPUT
            echo "p31ca subtree present — security jobs will run."
          else
            echo "has_p31ca=false" >> $GITHUB_OUTPUT
            echo "::notice::andromeda/04_SOFTWARE/p31ca not in this Git tree — security jobs skipped (expected for bonding-soup without committed Andromeda). See docs/P31-RELEASE-LADDER-CI.md"
          fi

  security:
    name: Security (SCA + Workers + Crypto)
    needs: meta
    if: needs.meta.outputs.has_p31ca == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: andromeda/04_SOFTWARE/p31ca/package-lock.json

      - name: Install p31ca deps
        run: npm ci
        working-directory: andromeda/04_SOFTWARE/p31ca

      - name: Install quantum-core deps (if present)
        run: |
          if [ -f andromeda/04_SOFTWARE/packages/quantum-core/package.json ]; then
            npm ci
            echo "quantum-core: deps installed"
          else
            echo "quantum-core: not in checkout — PQC gate will skip"
          fi
        working-directory: andromeda/04_SOFTWARE/packages/quantum-core
        continue-on-error: true

      - name: Phase B — SCA (npm audit)
        run: node scripts/security/run.mjs --ci --only=B
        working-directory: andromeda/04_SOFTWARE/p31ca

      - name: Phase C — Worker inventory + CORS scan
        run: node scripts/security/run.mjs --ci --only=C
        working-directory: andromeda/04_SOFTWARE/p31ca

      - name: Phase E — Crypto surface (PQC gate + passkey boundary)
        run: node scripts/security/run.mjs --ci --only=E
        working-directory: andromeda/04_SOFTWARE/p31ca

      - name: Upload security inventory
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-inventory-${{ github.run_id }}
          path: |
            andromeda/04_SOFTWARE/p31ca/build/security-inventory.json
            andromeda/04_SOFTWARE/p31ca/build/security-report.json
          retention-days: 30

  # Semgrep SAST — report-only (uploads SARIF to GitHub Security tab)
  # Promoted to blocking after noise is triaged.
  sast:
    name: SAST (Semgrep)
    needs: meta
    if: github.event_name != 'schedule' && needs.meta.outputs.has_p31ca == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/security-audit
          generateSarif: "1"
          auditOn: push
        continue-on-error: true  # Report-only until noise is triaged

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true
