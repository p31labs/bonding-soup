name: TRIPER Daily Certification

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC
  workflow_dispatch:     # Manual trigger

jobs:
  triper-cert:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run TRIPER certification
        id: triper-cert
        run: |
          echo "Starting TRIPER certification..."
          npm run test:triper:cert
          CERT_STATUS=$?
          echo "cert_status=$CERT_STATUS" >> $GITHUB_OUTPUT
          
          # Copy latest cert to artifact location
          LATEST_CERT=$(ls -t tests/triper/logs/cert-*.json 2>/dev/null | head -1)
          if [ -n "$LATEST_CERT" ]; then
            mkdir -p triper-artifacts
            cp "$LATEST_CERT" triper-artifacts/cert-$(date +%Y-%m-%d).json
            echo "Cert copied: $LATEST_CERT"
          fi
      
      - name: Upload cert artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: triper-certification-${{ github.run_id }}
          path: triper-artifacts/
          retention-days: 30
      
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `TRIPER Daily Certification Failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = `## TRIPER Daily Certification Failed
            
            The daily TRIPER certification run has failed.
            
            **Details:**
            - Workflow Run: ${context.payload.repository.html_url}/actions/runs/${context.runId}
            - Date: ${new Date().toISOString()}
            - Commit: ${context.sha}
            
            Please investigate and rerun if needed:
            \`\`\`bash
            npm run test:triper:cert
            \`\`\`
            
            ---
            *This issue was automatically generated by the TRIPER Daily Certification workflow.*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['triper', 'ci-failure', 'automated']
            });
