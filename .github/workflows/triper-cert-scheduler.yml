name: TRIPER Daily Certification

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC
  workflow_dispatch:     # Manual trigger

jobs:
  triper-cert:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run TRIPER certification
        id: triper-cert
        run: |
          echo "Starting TRIPER certification..."
          npm run test:triper:cert
          CERT_STATUS=$?
          echo "cert_status=$CERT_STATUS" >> $GITHUB_OUTPUT
          
          # Copy latest cert to artifact location
          if [ -f tests/triper/logs/cert-latest.json ]; then
            mkdir -p triper-artifacts
            cp tests/triper/logs/cert-latest.json triper-artifacts/cert-$(date +%Y-%m-%d).json
          fi
      
      - name: Upload cert artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: triper-certification-${{ github.run_id }}
          path: triper-artifacts/
          retention-days: 30
      
      - name: Comment on workflow run
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.workflow_run.id }}
          body: |
            ## TRIPER Daily Certification Failed
            
            The daily TRIPER certification run has failed.
            
            **Details:**
            - Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Date: ${{ github.event.workflow_run.created_at }}
            
            Please investigate and rerun if needed.
            
            ---
            *This comment was automatically generated by the TRIPER Daily Certification workflow.*

name: Cert Freshness Check

on:
  workflow_call:
    inputs:
      max-age-hours:
        description: 'Maximum age of cert in hours'
        required: false
        default: '24'
        type: string

jobs:
  check-cert-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get latest cert timestamp
        id: get-cert
        run: |
          if [ -f tests/triper/logs/cert-latest.json ]; then
            TIMESTAMP=$(jq -r '.timestamp' tests/triper/logs/cert-latest.json)
            echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Check cert freshness
        if: steps.get-cert.outputs.found == 'true'
        run: |
          CERT_TIMESTAMP=$(date -d "${{ steps.get-cert.outputs.timestamp }}" +%s)
          NOW=$(date +%s)
          AGE_HOURS=$(( (NOW - CERT_TIMESTAMP) / 3600 ))
          MAX_AGE=${{ inputs.max-age-hours }}
          
          echo "Cert age: $AGE_HOURS hours (max: $MAX_AGE)"
          
          if [ $AGE_HOURS -gt $MAX_AGE ]; then
            echo "Cert is stale (>$MAX_AGE hours)"
            echo "fresh=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "Cert is fresh (≤$MAX_AGE hours)"
            echo "fresh=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Fail if cert is stale
        if: steps.check-cert-freshness.outputs.fresh == 'false'
        run: |
          echo "❌ TRIPER certification is stale"
          echo "Please run the TRIPER Daily Certification workflow or run locally:"
          echo ""
          echo "  npm run test:triper:cert"
          echo ""
          exit 1
      
      - name: Success if cert is fresh
        if: steps.check-cert-freshness.outputs.fresh == 'true'
        run: echo "✓ TRIPER certification is fresh"