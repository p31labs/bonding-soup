<!DOCTYPE html>
<html lang="en">
<head>
  <title>Initial Build - P31</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <style>
    :root {
      --p31-void: #0b0d10; --p31-surface: #161920; --p31-surface2: #1c2028;
      --p31-teal: #25897d; --p31-coral: #cc6247; --p31-butter: #cda852;
      --p31-lavender: #8b7cc9; --p31-phosphorus: #3ba372; --p31-cyan: #4db8a8;
      --p31-cloud: #d8d6d0; --p31-muted: #6b7280;
      --p31-glass-border: rgba(255, 255, 255, 0.08);
      --p31-font-sans: "Atkinson Hyperlegible", system-ui, sans-serif;
      --p31-font-mono: "JetBrains Mono", monospace;
      --p31-font-serif: "Playfair Display", serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--p31-void); color: var(--p31-cloud); font-family: var(--p31-font-sans); display: flex; flex-direction: column; min-height: 100vh; -webkit-font-smoothing: antialiased; line-height: 1.6; }
    a { color: inherit; text-decoration: none; }
    :focus-visible { outline: 2px solid var(--p31-teal); outline-offset: 2px; border-radius: 4px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
    body.safe-mode { --p31-void: #000; --p31-surface: #0a0a0a; --p31-surface2: #111; --p31-cloud: #fff; --p31-muted: #888; }
    body.safe-mode * { animation: none !important; transition: none !important; }
    body.safe-mode canvas, body.safe-mode .hide-safe { display: none !important; }
    .btn-safe { padding: 0.5rem 0.75rem; border: 1px solid rgba(204,98,71,0.3); border-radius: 6px; background: rgba(204,98,71,0.08); color: var(--p31-coral); font-family: var(--p31-font-mono); font-size: 0.75rem; text-transform: uppercase; cursor: pointer; z-index: 100; transition: all 150ms; }
    .btn-safe:hover { background: rgba(204,98,71,0.15); }
    .skip-link { position: absolute; top: -40px; left: 0; background: var(--p31-teal); color: #000; padding: 8px 16px; z-index: 1000; font-weight: 700; transition: top 0.2s; }
    .skip-link:focus { top: 0; }
    .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; border-bottom: 1px solid var(--p31-glass-border); background: rgba(11,13,16,0.8); z-index: 50; backdrop-filter: blur(10px); }
    .nav-brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; color: var(--p31-cloud); font-size: 0.9rem; }
    .page-wrapper { max-width: 1000px; margin: 0 auto; padding: 0 1.5rem 2rem; width: 100%; flex-grow: 1; display: flex; flex-direction: column; }
    .glass-card { background: color-mix(in srgb, var(--p31-surface2) 60%, transparent); border: 1px solid var(--p31-glass-border); border-radius: 12px; padding: 2rem; backdrop-filter: blur(20px); }
    .header-row { display: flex; justify-content: space-between; align-items: flex-end; margin: 2rem 0; flex-wrap: wrap; gap: 1rem; }
    .title-group h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .tagline { color: var(--p31-muted); font-size: 1.1rem; max-width: 600px; }
    .ebc-footer { margin-top: auto; padding: 1.5rem; display: flex; justify-content: center; gap: 2rem; border-top: 1px solid var(--p31-glass-border); background: var(--p31-surface); font-family: var(--p31-font-mono); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--p31-muted); }
    .ebc-footer a:hover { color: var(--p31-cloud); }
    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
    .form-hint { display: block; font-size: 0.85rem; color: var(--p31-muted); margin-bottom: 0.75rem; }
    .form-input, .form-textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--p31-glass-border); border-radius: 8px; padding: 0.85rem 1rem; color: var(--p31-cloud); font-family: var(--p31-font-sans); transition: all 200ms;}
    .form-textarea { min-height: 100px; resize: vertical; }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--p31-teal); }
    .btn-submit { background: var(--p31-teal); color: #000; border: none; padding: 1rem 2rem; border-radius: 8px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: filter 150ms;}
    .btn-submit:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a href="/" class="nav-brand">
      <svg viewBox="0 0 100 100" width="24" height="24" fill="none">
        <path d="M50 10 L90 85 L10 85 Z" stroke="var(--p31-teal)" stroke-width="5" stroke-linejoin="round"/>
        <path d="M50 10 L50 60 L90 85" stroke="var(--p31-coral)" stroke-width="5" stroke-linejoin="round" opacity="0.8"/>
        <path d="M50 60 L10 85" stroke="var(--p31-butter)" stroke-width="5" stroke-linejoin="round" opacity="0.6"/>
      </svg>
      Initial Build
    </a>
    <button id="safeModeBtn" class="btn-safe">Safe Mode</button>
  </nav>
  <main class="page-wrapper">
    <div class="header-row">
      <div class="title-group">
        <h1><span aria-hidden="true">🏗️</span> WCD Intake</h1>
      </div>
      <p class="tagline">Define the boundaries before you break ground.</p>
    </div>
    <div class="glass-card">
      <div class="form-group">
        <label class="form-label">Project Title</label>
        <input type="text" class="form-input" placeholder="e.g., C.A.R.S. Refactor">
      </div>
      <div class="form-group">
        <label class="form-label" style="color: var(--p31-coral);">Tag-Out Boundaries</label>
        <span class="form-hint">What are we NOT doing?</span>
        <textarea class="form-textarea" style="border-color: rgba(204, 98, 71, 0.3); background: rgba(204, 98, 71, 0.05);"></textarea>
      </div>
      <button class="btn-submit" id="btnSubmit">Generate WCD</button>
    </div>
  </main>
  <footer class="ebc-footer">
    <a href="/build.html" style="color:var(--p31-teal)">Build</a>
    <a href="/geodesic.html">Create</a>
    <a href="/connect.html">Connect</a>
  </footer>
  <script src="/lib/p31-atmosphere-core.js"></script>
  <script>
    const safeBtn = document.getElementById('safeModeBtn');
    if(safeBtn) safeBtn.addEventListener('click', () => document.body.classList.toggle('safe-mode'));
  </script>
  <script>
    document.getElementById('btnSubmit').addEventListener('click', (e) => {
      e.target.textContent = "WCD Generated ✓";
      e.target.style.background = "var(--p31-phosphorus)";
      setTimeout(() => {
        e.target.textContent = "Generate WCD";
        e.target.style.background = "";
      }, 2000);
    });
  </script>
</body>
</html>
