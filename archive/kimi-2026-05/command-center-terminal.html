<!DOCTYPE html>
<html lang="en">
<head>
  <title>Command Center - P31 Local</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <style>
    :root {
      --p31-void: #0b0d10; --p31-surface: #161920; --p31-surface2: #1c2028;
      --p31-teal: #25897d; --p31-coral: #cc6247; --p31-butter: #cda852;
      --p31-lavender: #8b7cc9; --p31-phosphorus: #3ba372; --p31-cyan: #4db8a8;
      --p31-cloud: #d8d6d0; --p31-muted: #6b7280;
      --p31-glass-border: rgba(255, 255, 255, 0.08);
      --p31-font-sans: "Atkinson Hyperlegible", system-ui, sans-serif;
      --p31-font-mono: "JetBrains Mono", monospace;
      --p31-font-serif: "Playfair Display", serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--p31-void); color: var(--p31-cloud); font-family: var(--p31-font-sans); display: flex; flex-direction: column; min-height: 100vh; -webkit-font-smoothing: antialiased; line-height: 1.6; }
    a { color: inherit; text-decoration: none; }
    :focus-visible { outline: 2px solid var(--p31-teal); outline-offset: 2px; border-radius: 4px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
    body.safe-mode { --p31-void: #000; --p31-surface: #0a0a0a; --p31-surface2: #111; --p31-cloud: #fff; --p31-muted: #888; }
    body.safe-mode * { animation: none !important; transition: none !important; }
    body.safe-mode canvas, body.safe-mode .hide-safe { display: none !important; }
    .btn-safe { padding: 0.5rem 0.75rem; border: 1px solid rgba(204,98,71,0.3); border-radius: 6px; background: rgba(204,98,71,0.08); color: var(--p31-coral); font-family: var(--p31-font-mono); font-size: 0.75rem; text-transform: uppercase; cursor: pointer; z-index: 100; transition: all 150ms; }
    .btn-safe:hover { background: rgba(204,98,71,0.15); }
    .skip-link { position: absolute; top: -40px; left: 0; background: var(--p31-teal); color: #000; padding: 8px 16px; z-index: 1000; font-weight: 700; transition: top 0.2s; }
    .skip-link:focus { top: 0; }
    .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; border-bottom: 1px solid var(--p31-glass-border); background: rgba(11,13,16,0.8); z-index: 50; backdrop-filter: blur(10px); }
    .nav-brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; color: var(--p31-cloud); font-size: 0.9rem; }
    body { font-family: var(--p31-font-mono); height: 100vh; overflow: hidden; padding: 0; }
    .term-wrapper { display: flex; flex-grow: 1; height: 100vh; width: 100%;}
    .sidebar { width: 260px; background: var(--p31-surface); border-right: 1px solid var(--p31-glass-border); padding: 1.5rem 1rem; display: flex; flex-direction: column; }
    .main { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
    .output { flex-grow: 1; padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; font-size: 0.9rem; line-height: 1.5;}
    .input-area { border-top: 1px solid var(--p31-glass-border); padding: 1.5rem 2rem; display: flex; gap: 1rem; background: var(--p31-surface); align-items: center;}
    .input { flex-grow: 1; background: transparent; border: none; color: var(--p31-cloud); font-family: inherit; font-size: 1rem; outline: none; }
    .sys { color: var(--p31-muted); font-style: italic; }
    .prompt { color: var(--p31-teal); font-weight: 700; }
    .persona-btn { display: block; width: 100%; text-align: left; background: transparent; border: none; color: var(--p31-muted); padding: 0.75rem 1rem; cursor: pointer; font-family: inherit; border-left: 2px solid transparent; border-radius: 0 6px 6px 0; margin-bottom: 0.25rem;}
    .persona-btn.active { color: var(--p31-cloud); border-left-color: var(--p31-teal); background: rgba(255, 255, 255, 0.05); }
    .persona-btn:hover { background: rgba(255, 255, 255, 0.03); }
    .sidebar-title { font-size: 0.8rem; color: var(--p31-muted); margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.1em;}
  </style>
</head>
<body>
  <div class="term-wrapper">
    <aside class="sidebar">
      <div class="sidebar-title">Ollama Fleet</div>
      <button class="persona-btn active" onclick="setPersona('p31-mechanic')">⚙️ p31-mechanic</button>
      <button class="persona-btn" onclick="setPersona('p31-counsel')">⚖️ p31-counsel</button>
      <button class="persona-btn" onclick="setPersona('p31-phos')">🌟 p31-phos</button>
      <button class="btn-safe" id="safeModeBtn" style="margin-top: auto;">Safe Mode</button>
      <a href="/" style="text-align:center; font-size:0.75rem; color:var(--p31-muted); margin-top:1rem;">← Return to Hub</a>
    </aside>
    <main class="main">
      <div class="output" id="output">
        <div><span class="sys">[SYS]</span> PiP CLI Initialized. Lane C Tunnel Active.</div>
        <div><span class="prompt">root@p31-edge:~#</span> awaiting command...</div>
      </div>
      <div class="input-area">
        <span class="prompt" id="promptTxt">p31-mechanic ❯</span>
        <input type="text" class="input" id="cmdInput" placeholder="Type a command or chat... (Use /help)" autocomplete="off" autofocus>
      </div>
    </main>
  </div>
  <script src="/lib/p31-atmosphere-core.js"></script>
  <script>
    const safeBtn = document.getElementById('safeModeBtn');
    if(safeBtn) safeBtn.addEventListener('click', () => document.body.classList.toggle('safe-mode'));
  </script>
  <script>
    let persona = 'p31-mechanic';
    function setPersona(p) {
      persona = p;
      document.querySelectorAll('.persona-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');
      document.getElementById('promptTxt').textContent = `${p} ❯`;
      document.getElementById('promptTxt').style.color = (p === 'p31-counsel' || p === 'p31-phos') ? 'var(--p31-coral)' : 'var(--p31-teal)';
    }
    document.getElementById('cmdInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.value.trim() !== '') {
        const out = document.getElementById('output');
        const v = e.target.value;
        out.innerHTML += `<div><span class="prompt">❯</span> ${v}</div>`;
        if (v === '/help') {
          out.innerHTML += `<div><span class="sys">Commands: npm run verify:mesh, /clear</span></div>`;
        } else if (v.startsWith('npm run')) {
          out.innerHTML += `<div style="color:var(--p31-phosphorus)">✓ Executed ${v}. All tests passed.</div>`;
        } else if (v === '/clear') {
          out.innerHTML = '';
        } else {
          out.innerHTML += `<div><span class="prompt" style="color:${document.getElementById('promptTxt').style.color}">[${persona}]</span> Processing in local context space...</div>`;
        }
        e.target.value = '';
        out.scrollTop = out.scrollHeight;
      }
    });
  </script>
</body>
</html>
