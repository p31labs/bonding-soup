<!DOCTYPE html>
<html lang="en" data-p31-appearance="hub">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Command Center · P31</title>
  <meta name="description" content="Phosphorus31 — Family mesh infrastructure for the neurodivergent operator">
  <meta name="theme-color" content="#0f1115">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/lib/p31-qmu-tokens.css">
  <link rel="stylesheet" href="/p31-style.css">
  
  <style>
    /* Starfield Canvas */
    #starfield-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.5;
    }
    body.safe-mode #starfield-canvas { display: none !important; }
    
    /* Safe Mode Toggle */
    .safe-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10000;
      padding: 0.5rem 0.75rem;
      border: 1px solid rgba(204,98,71,0.3);
      border-radius: 6px;
      background: rgba(204,98,71,0.08);
      color: var(--p31-coral);
      font-family: var(--p31-font-mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 150ms;
    }
    .safe-toggle:hover { background: rgba(204,98,71,0.15); }
    
    /* PHOS Orb */
    .phos-orb {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 60px;
      height: 60px;
      z-index: 9999;
      cursor: pointer;
      filter: drop-shadow(0 0 10px rgba(77,184,168,0.4));
      transition: transform 0.3s ease;
    }
    .phos-orb:hover { transform: scale(1.1); }
    body.safe-mode .phos-orb { filter: grayscale(1); animation: none; }
    
    /* Power Level Indicator */
    .power-level {
      position: fixed;
      bottom: 2rem;
      right: 5rem;
      z-index: 9998;
      display: flex;
      gap: 0.25rem;
    }
    .power-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--p31-muted);
      transition: all 0.3s;
    }
    .power-dot.active { background: var(--p31-cyan); box-shadow: 0 0 8px var(--p31-cyan); }
    
    /* Main Content */
    main { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <canvas id="starfield-canvas"></canvas>
  <button class="safe-toggle" onclick="document.body.classList.toggle('safe-mode')">Safe Mode</button>
  
  
  
  <main>
    
  <article class="page-content">
    <header class="page-header">
      <h1>Command Center</h1>
    </header>
    <div class="page-body">
      <p>This is the Command Center page.</p>
      <p>Type: ops</p>
      <p>PHOS enabled: No</p>
    </div>
  </article>
  
  </main>
  
  
  <script type="module">
    import { Starfield } from '/lib/p31-starfield.mjs';
    const starfield = new Starfield('starfield-canvas', {
      surfaceId: 'command-center-terminal',
      starCount: 100,
      meshSync: true
    });
  </script>
  
  
  
</body>
</html>
