<!DOCTYPE html>
<html lang="en" data-p31-appearance="hub">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Geodesic Builder · P31</title>
  <meta name="description" content="Phosphorus31 — Family mesh infrastructure for the neurodivergent operator">
  <meta name="theme-color" content="#0f1115">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/public/lib/p31-qmu-tokens.css">
  <link rel="stylesheet" href="/p31-style.css">
  
  <style>
    /* Starfield Canvas */
    #starfield-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.5;
    }
    body.safe-mode #starfield-canvas { display: none !important; }
    
    /* Safe Mode Toggle */
    .safe-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10000;
      padding: 0.5rem 0.75rem;
      border: 1px solid rgba(204,98,71,0.3);
      border-radius: 6px;
      background: rgba(204,98,71,0.08);
      color: var(--p31-coral);
      font-family: var(--p31-font-mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 150ms;
    }
    .safe-toggle:hover { background: rgba(204,98,71,0.15); }
    
    /* PHOS Orb */
    .phos-orb {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 60px;
      height: 60px;
      z-index: 9999;
      cursor: pointer;
      filter: drop-shadow(0 0 10px rgba(77,184,168,0.4));
      transition: transform 0.3s ease;
    }
    .phos-orb:hover { transform: scale(1.1); }
    body.safe-mode .phos-orb { filter: grayscale(1); animation: none; }
    
    /* Power Level Indicator */
    .power-level {
      position: fixed;
      bottom: 2rem;
      right: 5rem;
      z-index: 9998;
      display: flex;
      gap: 0.25rem;
    }
    .power-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--p31-muted);
      transition: all 0.3s;
    }
    .power-dot.active { background: var(--p31-cyan); box-shadow: 0 0 8px var(--p31-cyan); }
    
    /* Main Content */
    main { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <canvas id="starfield-canvas"></canvas>
  <button class="safe-toggle" onclick="document.body.classList.toggle('safe-mode')">Safe Mode</button>
  
  
  <div class="phos-orb" id="phos-orb" title="PHOS Navigation">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="orb-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#4db8a8;stop-opacity:0.9"/>
          <stop offset="100%" style="stop-color:#3ba372;stop-opacity:0.7"/>
        </linearGradient>
      </defs>
      <polygon points="50,10 10,90 90,90" fill="none" stroke="url(#orb-grad)" stroke-width="2"/>
      <polygon points="50,30 25,75 75,75" fill="url(#orb-grad)" opacity="0.5"/>
    </svg>
  </div>
  <div class="power-level" id="power-level">
    <div class="power-dot" data-level="0"></div><div class="power-dot" data-level="1"></div><div class="power-dot" data-level="2"></div><div class="power-dot" data-level="3"></div><div class="power-dot" data-level="4"></div><div class="power-dot" data-level="5"></div><div class="power-dot" data-level="6"></div>
  </div>
  
  
  <main>
    
  <div class="app-container">
    <header class="app-header">
      <h1>🔺 Geodesic Builder</h1>
      <p>Build worlds with your kids · Block-based 3D construction</p>
    </header>
    <div class="builder-grid">
      <aside class="toolbar">
        <h3>Tools</h3>
        <div class="tool-grid">
          <button class="tool active" data-tool="place">🧱 Place</button>
          <button class="tool" data-tool="delete">🔨 Delete</button>
          <button class="tool" data-tool="paint">🎨 Paint</button>
          <button class="tool" data-tool="rotate">🔄 Rotate</button>
        </div>
        <h3>Shapes</h3>
        <div class="shape-list">
          <button class="shape active" data-shape="cube">🧱 Cube</button>
          <button class="shape" data-shape="sphere">🔵 Sphere</button>
          <button class="shape" data-shape="cylinder">🛢️ Cylinder</button>
          <button class="shape" data-shape="wedge">📐 Wedge</button>
        </div>
        <h3>Presets</h3>
        <button class="preset" onclick="builder.generate('dome')">🏠 Dome</button>
        <button class="preset" onclick="builder.generate('tower')">🗼 Tower</button>
        <button class="preset" onclick="builder.generate('bridge')">🌉 Bridge</button>
      </aside>
      <main class="canvas-container">
        <canvas id="builder-canvas"></canvas>
        <div class="canvas-overlay">
          <div class="coords">X: 0 Y: 0 Z: 0</div>
          <div class="mode">Place Mode</div>
        </div>
      </main>
      <aside class="properties">
        <h3>Colors</h3>
        <div class="color-grid">
          <button class="color-btn" style="background:#4db8a8" data-color="#4db8a8"></button><button class="color-btn" style="background:#cc6247" data-color="#cc6247"></button><button class="color-btn" style="background:#cda852" data-color="#cda852"></button><button class="color-btn" style="background:#8b7cc9" data-color="#8b7cc9"></button><button class="color-btn" style="background:#3ba372" data-color="#3ba372"></button><button class="color-btn" style="background:#e74c3c" data-color="#e74c3c"></button><button class="color-btn" style="background:#3498db" data-color="#3498db"></button><button class="color-btn" style="background:#9b59b6" data-color="#9b59b6"></button>
        </div>
        <h3>World</h3>
        <button class="action" onclick="builder.save()">💾 Save</button>
        <button class="action" onclick="builder.load()">📂 Load</button>
        <button class="action" onclick="builder.clear()">🗑️ Clear</button>
        <button class="action" onclick="builder.share()">🔗 Share</button>
      </aside>
    </div>
  </div>
  <script type="module">
    import { GeodesicBuilder } from '/public/lib/p31-geodesic-builder.mjs';
    window.builder = new GeodesicBuilder('builder-canvas');
  </script>
  
  </main>
  
  
  <script type="module">
    import { Starfield } from '/public/lib/p31-starfield.mjs';
    const starfield = new Starfield('starfield-canvas', {
      surfaceId: 'geodesic-builder',
      starCount: 80,
      meshSync: true
    });
  </script>
  
  
  
  <script type="module">
    import { PHOS } from '/public/lib/p31-phos-core.mjs';
    window.phos = new PHOS({
      mount: '#phos-orb',
      pageId: 'geodesic-builder',
      powerLevels: [0,1,2,3,4,5,6]
    });
  </script>
  
</body>
</html>
