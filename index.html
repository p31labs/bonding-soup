<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>P31 | Ca₉(PO₄)₆ Posner Molecule</title>
  <meta name="description" content="The Posner molecule of our family. 9 calcium ions. 1 phosphorus core. Infinite coherence.">

  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ── CANONICAL TOKENS ── */
    :root {
      --void:      #0f1115;
      --surface:   #161920;
      --surface2:  #1c2028;
      --teal:      #5DCAA5;
      --coral:     #cc6247;
      --amber:     #cda852;
      --lavender:  #8b7cc9;
      --phosphorus:#3ba372;
      --cyan:      #4db8a8;
      --cloud:     #d8d6d0;
      --muted:     #6b7280;
      --border:    rgba(255,255,255,0.08);
      --font:      'Inter', system-ui, sans-serif;
      --mono:      'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: var(--void);
      color: var(--cloud);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }

    /* ── NAV ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.5rem 2.5rem;
      background: linear-gradient(to bottom, rgba(15,17,21,0.92) 0%, transparent 100%);
      pointer-events: none;
    }
    .brand {
      display: flex; align-items: center; gap: 0.75rem;
      font-weight: 700; font-size: 1.2rem; letter-spacing: -0.02em;
      pointer-events: auto;
    }
    .brand-sub { font-family: var(--mono); font-size: 0.82rem; font-weight: 400; color: var(--muted); }
    .btn-safe {
      pointer-events: auto;
      padding: 0.6rem 1.25rem;
      border: 1px solid rgba(204,98,71,0.42); border-radius: 8px;
      background: rgba(204,98,71,0.1); color: var(--coral);
      font-family: var(--mono); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      backdrop-filter: blur(12px);
      transition: all 0.2s;
    }
    .btn-safe:hover { background: rgba(204,98,71,0.22); box-shadow: 0 0 22px rgba(204,98,71,0.3); }

    /* ── FOOTER ── */
    footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      display: flex; justify-content: flex-end; gap: 2.5rem;
      padding: 1.5rem 2.5rem; pointer-events: none;
      font-family: var(--mono); font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
    }
    footer a { color: inherit; text-decoration: none; pointer-events: auto; transition: color 0.2s; }
    footer a:hover { color: var(--cloud); }
    body.safe footer { display: none; }

    /* ── CANVAS LAYERS ── */
    .lc {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
    }
    #c0 { z-index: 1; }  /* Starfield */
    #c1 { z-index: 5; }  /* Tethers */

    /* ── NODE LAYER ── */
    #node-layer { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

    /* ── ORBITAL NODES (DOM) ── */
    .nd {
      position: absolute; top: 0; left: 0;
      width: 72px; height: 72px;
      margin-left: -36px; margin-top: -36px;
      border-radius: 50%;
      pointer-events: auto; cursor: pointer; text-decoration: none;
      display: flex; justify-content: center; align-items: center;
      will-change: transform;

      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,0.2) 0%, transparent 38%),
        radial-gradient(circle at 66% 70%, color-mix(in srgb, var(--nc) 26%, transparent) 0%, transparent 44%),
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--nc) 11%, rgba(22,25,32,0.96)) 0%, rgba(15,17,21,0.97) 75%);

      border: 1px solid color-mix(in srgb, var(--nc) 58%, transparent);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        inset 0 0 22px color-mix(in srgb, var(--nc) 48%, transparent),
        inset -5px -5px 14px rgba(0,0,0,0.72),
        0 12px 28px rgba(0,0,0,0.65),
        0 0 38px color-mix(in srgb, var(--nc) 17%, transparent);

      backdrop-filter: blur(12px);
      transition: box-shadow 0.4s ease, border-color 0.35s ease;
      animation: nd-ambient 4s ease-in-out infinite;
    }

    .nd:nth-child(1) { animation-delay: 0.0s; }
    .nd:nth-child(2) { animation-delay:-0.7s; }
    .nd:nth-child(3) { animation-delay:-1.4s; }
    .nd:nth-child(4) { animation-delay:-2.1s; }
    .nd:nth-child(5) { animation-delay:-2.8s; }
    .nd:nth-child(6) { animation-delay:-0.3s; }
    .nd:nth-child(7) { animation-delay:-3.5s; }
    .nd:nth-child(8) { animation-delay:-1.8s; }
    .nd:nth-child(9) { animation-delay:-1.1s; }

    @keyframes nd-ambient {
      0%,100% { filter: brightness(1)    saturate(1); }
      50%      { filter: brightness(1.2)  saturate(1.25); }
    }

    /* Spinning electron rings */
    .nd::before {
      content: ''; position: absolute; inset: -10px; border-radius: 50%;
      border: 1px dashed color-mix(in srgb, var(--nc) 52%, transparent);
      animation: spin-cw 12s linear infinite; pointer-events: none;
    }
    .nd::after {
      content: ''; position: absolute; inset: -19px; border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--nc) 24%, transparent);
      animation: spin-ccw 20s linear infinite;
      pointer-events: none; opacity: 0; transition: opacity 0.4s;
    }
    .nd:hover {
      border-color: var(--nc); z-index: 50;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.28),
        inset 0 0 42px color-mix(in srgb, var(--nc) 85%, transparent),
        0 15px 35px rgba(0,0,0,0.72),
        0 0 72px color-mix(in srgb, var(--nc) 36%, transparent);
    }
    .nd:hover::after { opacity: 1; }

    @keyframes spin-cw  { to { transform: rotate( 360deg); } }
    @keyframes spin-ccw { to { transform: rotate(-360deg); } }

    .nd-icon {
      font-size: 1.8rem; position: relative; z-index: 2;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.88));
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .nd:hover .nd-icon { transform: scale(1.22); }

    .nd-lbl {
      position: absolute; bottom: -42px; white-space: nowrap;
      left: 50%; transform: translateX(-50%) translateY(-6px);
      background: rgba(15,17,21,0.97); border: 1px solid var(--nc);
      padding: 5px 14px; border-radius: 7px;
      color: #fff; font-family: var(--mono); font-size: 0.75rem; font-weight: 700;
      opacity: 0; transition: all 0.32s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none; box-shadow: 0 4px 14px rgba(0,0,0,0.65);
    }
    .nd:hover .nd-lbl { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── PHOS CORE WRAPPER (parallax + float from JS) ── */
    #phos-wrap {
      position: fixed; top: 50%; left: 50%;
      width: 160px; height: 160px;
      margin-left: -80px; margin-top: -80px;
      z-index: 40; cursor: pointer; pointer-events: auto;
      display: flex; align-items: center; justify-content: center;
    }

    /* Aura layers on wrapper */
    #phos-wrap::before {
      content: ''; position: absolute; inset: -55px; border-radius: 50%; z-index: 0;
      background: radial-gradient(circle, rgba(93,202,165,0.2) 0%, transparent 68%);
      animation: aura 4.5s ease-in-out infinite; pointer-events: none;
    }
    #phos-wrap::after {
      content: ''; position: absolute; inset: -22px; border-radius: 50%; z-index: 0;
      border: 1px solid rgba(93,202,165,0.22);
      animation: aura-ring 3.5s ease-in-out infinite; pointer-events: none;
    }

    #phos-svg {
      width: 100%; height: 100%; position: relative; z-index: 1;
      filter: drop-shadow(0 10px 28px rgba(93,202,165,0.45));
      transition: transform 0.42s cubic-bezier(0.34,1.56,0.64,1), filter 0.42s;
    }
    #phos-wrap:hover #phos-svg {
      transform: scale(1.1) rotate(8deg);
      filter: drop-shadow(0 16px 36px rgba(93,202,165,0.75));
    }
    #phos-wrap:active #phos-svg { transform: scale(0.93); }

    /* SVG face geometry */
    .pb   { fill: rgba(22,25,32,0.96); stroke: var(--teal); stroke-width: 3; stroke-linejoin: round; transition: fill 0.35s; }
    .pb-b { fill: rgba(15,17,21,0.88); stroke: rgba(93,202,165,0.25); stroke-width: 1.5; }
    .pg   { fill: rgba(255,255,255,0.14); }
    .pe   { fill: #070a0a; transition: rx 0.22s, ry 0.22s; }
    .pi   { fill: none; stroke: var(--teal); stroke-width: 1.2; }
    .pp   { fill: rgba(200,255,235,0.92); transition: transform 0.12s ease-out; }
    .pbl  { fill: var(--coral); opacity: 0; filter: blur(3px); transition: opacity 0.4s; }
    .pm   { stroke: var(--teal); stroke-width: 2.2; fill: none; stroke-linecap: round; }
    .peg  { animation: blink 8s infinite; transform-origin: 50px 58px; }
    #phos-wrap:hover .pb  { fill: rgba(93,202,165,0.14); }
    #phos-wrap:hover .pbl { opacity: 0.68; }
    #phos-wrap:hover .pe  { rx: 6; ry: 10; }

    /* PHOS speech bubble */
    #speech {
      position: fixed; top: 50%; left: 50%;
      margin-left: 90px; margin-top: -95px;
      background: rgba(22,25,32,0.97); border: 1px solid var(--teal); border-radius: 16px 16px 16px 2px;
      padding: 1.1rem 1.4rem; max-width: 270px;
      color: #fff; font-family: var(--mono); font-size: 0.88rem; line-height: 1.55;
      box-shadow: 0 14px 36px rgba(0,0,0,0.72), 0 0 24px rgba(93,202,165,0.1);
      z-index: 60; pointer-events: none;
      opacity: 0; transform: translateY(10px) scale(0.95); transform-origin: bottom left;
      transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    #speech.on { opacity: 1; transform: translateY(0) scale(1); }

    @keyframes aura     { 0%,100% { transform: scale(1);    opacity: 0.55; } 50% { transform: scale(1.14); opacity: 1;   } }
    @keyframes aura-ring{ 0%,100% { transform: scale(1);    opacity: 0.4;  } 50% { transform: scale(1.1);  opacity: 0.78; } }
    @keyframes blink    { 0%,93%,97% { transform: scaleY(1); } 94%,96% { transform: scaleY(0.07); } }

    /* ── SAFE MODE ── */
    #safe-view {
      display: none; position: fixed; inset: 0; z-index: 300;
      padding: 6rem 2rem 2rem; overflow-y: auto; background: var(--void);
    }
    body.safe #safe-view { display: block; }
    body.safe #c0, body.safe #c1, body.safe #node-layer,
    body.safe #phos-wrap, body.safe #speech { display: none !important; }

    .safe-hdr { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .safe-hdr h1 { font-size: 2rem; color: #fff; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .safe-hdr p  { color: var(--muted); font-family: var(--mono); font-size: 0.82rem; }
    .safe-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px,1fr)); gap: 1.25rem; max-width: 1100px; }
    .safe-card {
      display: flex; align-items: center; gap: 1.25rem; padding: 1.4rem;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
      background: rgba(255,255,255,0.025); text-decoration: none; color: inherit;
      transition: all 0.2s;
    }
    .safe-card:hover { border-color: var(--nc); background: rgba(255,255,255,0.045); transform: translateY(-2px); }
    .safe-ico {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      border: 1px solid var(--nc); background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center; font-size: 1.7rem;
    }
    .safe-name { font-weight: 700; color: #fff; margin-bottom: 0.22rem; }
    .safe-desc { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
    .skip-link { position: absolute; left: -9999px; top: auto; width: 1px; height: 1px; overflow: hidden; }
    .skip-link:focus { position: static; width: auto; height: auto; }
  </style>
</head>

<script>
// ── ORBITAL DATA (Ca₉ Posner Molecule) ───────────────────────────────────────
const NODES = [
  // Ring 1 — Inner / Fast clockwise
  { id:'cog',  label:'Passport',     icon:'🧠', color:'var(--lavender)',   hex:'#8b7cc9', ring:1, a0:0,                       href:'/passport.html',   prompt:'Identity accommodations' },
  { id:'soup', label:'C.A.R.S.',     icon:'🍲', color:'var(--coral)',       hex:'#cc6247', ring:1, a0:Math.PI*2/3,             href:'/soup.html',       prompt:'Relational substrate' },
  { id:'grd',  label:'Garden',       icon:'👶', color:'var(--amber)',       hex:'#cda852', ring:1, a0:Math.PI*4/3,             href:'/garden.html',     prompt:'Kid-safe operations' },
  // Ring 2 — Middle / Slow counter-clockwise
  { id:'ops',  label:'Ops Desk',     icon:'🌐', color:'var(--teal)',        hex:'#5DCAA5', ring:2, a0:Math.PI/6,               href:'/ops.html',        prompt:'Triad fleet status' },
  { id:'buf',  label:'Buffer',       icon:'🛡️', color:'var(--coral)',       hex:'#cc6247', ring:2, a0:Math.PI/6+Math.PI*2/3,   href:'/buffer.html',     prompt:'Fawn-guard proxy' },
  { id:'gls',  label:'Transparency', icon:'📊', color:'var(--cyan)',        hex:'#4db8a8', ring:2, a0:Math.PI/6+Math.PI*4/3,   href:'/glass-box.html',  prompt:'System telemetry' },
  // Ring 3 — Outer / Slow clockwise
  { id:'forg', label:'Geodesic',     icon:'⚒️', color:'var(--teal)',        hex:'#5DCAA5', ring:3, a0:Math.PI/3,               href:'/geodesic.html',   prompt:'Spatial architecture' },
  { id:'vibe', label:'Vibe IDE',     icon:'🔮', color:'var(--phosphorus)',  hex:'#3ba372', ring:3, a0:Math.PI/3+Math.PI*2/3,   href:'/vibe.html',       prompt:'Coding substrate' },
  { id:'lib',  label:'Library',      icon:'📚', color:'var(--lavender)',    hex:'#8b7cc9', ring:3, a0:Math.PI/3+Math.PI*4/3,   href:'/doc-library.html',prompt:'Architectural canon' },
];

const RING_SPEED = { 1: 0.001, 2: -0.00062, 3: 0.00042 };

// ── DOM BUILD ─────────────────────────────────────────────────────────────────
const nlayer  = document.getElementById('node-layer');
const scards  = document.getElementById('safe-cards');
const phosEl  = document.getElementById('phos-wrap');
const speechEl= document.getElementById('speech');
const pl = document.getElementById('pl');
const pr = document.getElementById('pr');

const state = [];

NODES.forEach(n => {
  // Orbital node
  const a = document.createElement('a');
  a.href = n.href; a.className = 'nd';
  a.style.setProperty('--nc', n.color);
  a.setAttribute('aria-label', n.label);
  a.innerHTML = `<div class="nd-icon">${n.icon}</div><div class="nd-lbl">${n.label}</div>`;
  const s = { data: n, el: a, angle: n.a0, hovered: false, x: 0, y: 0 };
  a.addEventListener('mouseenter', () => { speak(`Ca-Ion: ${n.prompt}`, n.color); s.hovered = true; });
  a.addEventListener('mouseleave', () => { quieten(); s.hovered = false; });
  nlayer.appendChild(a);
  state.push(s);

  // Safe card
  const c = document.createElement('a');
  c.href = n.href; c.className = 'safe-card';
  c.style.setProperty('--nc', n.hex);
  c.innerHTML = `<div class="safe-ico">${n.icon}</div><div><div class="safe-name">${n.label}</div><div class="safe-desc">${n.prompt}</div></div>`;
  scards.appendChild(c);
});

// ── SPEECH ────────────────────────────────────────────────────────────────────
let speakTimer;
function speak(txt, col) {
  speechEl.textContent = txt;
  speechEl.style.borderColor = col || 'var(--teal)';
  speechEl.classList.add('on');
  clearTimeout(speakTimer);
}
function quieten(delay = 0) {
  clearTimeout(speakTimer);
  speakTimer = setTimeout(() => speechEl.classList.remove('on'), delay);
}

phosEl.addEventListener('mouseenter', () => speak('I am the bond at the center. The Phosphorus.', 'var(--amber)'));
phosEl.addEventListener('mouseleave', () => quieten(400));

// ── EYE TRACKING ─────────────────────────────────────────────────────────────
let mx = 0, my = 0;
window.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  const r   = phosEl.getBoundingClientRect();
  const ex  = r.left + r.width  / 2;
  const ey  = r.top  + r.height / 2;
  const ang = Math.atan2(e.clientY - ey, e.clientX - ex);
  const d   = Math.min(3, Math.hypot(e.clientX - ex, e.clientY - ey) * 0.014);
  const ox  = Math.cos(ang) * d, oy = Math.sin(ang) * d;
  pl.style.transform = `translate(${ox}px,${oy}px)`;
  pr.style.transform = `translate(${ox}px,${oy}px)`;
});

// ── CANVAS ────────────────────────────────────────────────────────────────────
const c0   = document.getElementById('c0');
const c1   = document.getElementById('c1');
const ctx0 = c0.getContext('2d', { alpha: false });
const ctx1 = c1.getContext('2d');
let W, H, CX, CY, dpr = window.devicePixelRatio || 1;
let R1, R2, R3, raf;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  CX = W / 2; CY = H / 2;
  [c0, c1].forEach(c => {
    c.width  = W * dpr; c.height = H * dpr;
    c.style.width  = W + 'px'; c.style.height = H + 'px';
  });
  ctx0.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx1.setTransform(dpr, 0, 0, dpr, 0, 0);
  const m = Math.min(W, H);
  R1 = Math.max(150, m * 0.245);
  R2 = Math.max(240, m * 0.375);
  R3 = Math.max(330, m * 0.500);
}

// ── SMART STARFIELD ───────────────────────────────────────────────────────────
class Star {
  constructor() {
    this.x     = Math.random() * (window.innerWidth  || 1400);
    this.y     = Math.random() * (window.innerHeight || 900);
    this.vx    = (Math.random() - 0.5) * 0.2;
    this.vy    = (Math.random() - 0.5) * 0.2;
    this.size  = Math.random() * 1.6 + 0.4;
    this.depth = Math.random();
    this.base  = 0.12 + this.depth * 0.48;
    this.phase = Math.random() * Math.PI * 2;
    const r = Math.random();
    this.color = r < 0.11 ? '#5DCAA5' : r < 0.2 ? '#cc6247' : '#ffffff';
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0) this.x = W; if (this.x > W) this.x = 0;
    if (this.y < 0) this.y = H; if (this.y > H) this.y = 0;
  }
  sx() { return this.x - (mx - CX) * 0.024 * (1 - this.depth); }
  sy() { return this.y - (my - CY) * 0.024 * (1 - this.depth); }
}

const STARS = Array.from({ length: 150 }, () => new Star());

function drawStarfield(t) {
  // Full clear — no trail splotches
  ctx0.fillStyle = '#0f1115';
  ctx0.fillRect(0, 0, W, H);

  // O(n²) K4 proximity mesh
  ctx0.lineWidth = 0.55;
  for (let i = 0; i < STARS.length; i += 2) {
    const ax = STARS[i].sx(), ay = STARS[i].sy();
    for (let j = i + 2; j < STARS.length; j += 2) {
      const bx = STARS[j].sx(), by = STARS[j].sy();
      const distSq = (ax-bx)*(ax-bx) + (ay-by)*(ay-by);
      if (distSq < 14400) { // 120px threshold
        ctx0.globalAlpha = (1 - Math.sqrt(distSq) / 120) * 0.28;
        ctx0.strokeStyle = (STARS[i].color !== '#ffffff' || STARS[j].color !== '#ffffff') ? '#5DCAA5' : '#d8d6d0';
        ctx0.beginPath(); ctx0.moveTo(ax, ay); ctx0.lineTo(bx, by); ctx0.stroke();
      }
    }
  }

  // Stars with per-star color
  STARS.forEach(s => {
    const twinkle = 0.15 * Math.sin(t * 2.4 + s.phase);
    ctx0.globalAlpha = Math.max(0, s.base + twinkle);
    ctx0.fillStyle = s.color;
    ctx0.beginPath(); ctx0.arc(s.sx(), s.sy(), s.size, 0, Math.PI * 2); ctx0.fill();
  });
  ctx0.globalAlpha = 1;
}

// ── DATA PACKETS ──────────────────────────────────────────────────────────────
class Packet {
  constructor(ring) {
    this.t     = Math.random();
    this.speed = (0.003 + (4 - ring) * 0.001) * (0.7 + Math.random() * 0.6);
    this.len   = 8 + Math.random() * 12;
  }
  tick(x1, y1, x2, y2, cpx, cpy) {
    this.t += this.speed;
    if (this.t > 1) this.t = 0;
    const it = 1 - this.t, tv = this.t;
    const x  = it*it*x1 + 2*it*tv*cpx + tv*tv*x2;
    const y  = it*it*y1 + 2*it*tv*cpy + tv*tv*y2;
    const dx = 2*it*(cpx-x1) + 2*tv*(x2-cpx);
    const dy = 2*it*(cpy-y1) + 2*tv*(y2-cpy);
    ctx1.save();
    ctx1.translate(x, y);
    ctx1.rotate(Math.atan2(dy, dx));
    // Glowing streak
    const g = ctx1.createLinearGradient(-this.len/2, 0, this.len/2, 0);
    g.addColorStop(0,   'rgba(255,255,255,0)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.88)');
    g.addColorStop(1,   'rgba(255,255,255,0)');
    ctx1.fillStyle = g;
    ctx1.fillRect(-this.len/2, -1.5, this.len, 3);
    ctx1.restore();
  }
}

state.forEach(s => {
  s.packets = [new Packet(s.data.ring), new Packet(s.data.ring), new Packet(s.data.ring)];
});

// ── MOLECULE DRAW ─────────────────────────────────────────────────────────────
function drawMolecule(t) {
  ctx1.clearRect(0, 0, W, H);

  const px = (mx - CX) * 0.02;
  const py = (my - CY) * 0.02;

  // Orbital shell rings (dashed, animated)
  [R1, R2, R3].forEach((r, i) => {
    ctx1.beginPath(); ctx1.arc(CX, CY, r, 0, Math.PI * 2);
    ctx1.strokeStyle = `rgba(93,202,165,${0.042 + i * 0.016})`;
    ctx1.lineWidth = 0.8;
    ctx1.setLineDash([4, 12]);
    ctx1.lineDashOffset = -t * 8 * (i % 2 === 0 ? 1 : -1);
    ctx1.stroke();
    ctx1.setLineDash([]);
  });

  // Node orbits + tethers + packets
  state.forEach((s, i) => {
    if (!s.hovered) s.angle += RING_SPEED[s.data.ring];
    const R   = [R1, R2, R3][s.data.ring - 1] + Math.sin(t * 1.6 + i) * 6;
    const dep = s.data.ring;
    s.x = CX + Math.cos(s.angle) * R - px * dep;
    s.y = CY + Math.sin(s.angle) * R - py * dep;
    s.el.style.transform = `translate3d(${s.x}px,${s.y}px,0)`;

    // Bezier tether: center → node, curved organically
    const dx  = s.x - CX, dy = s.y - CY;
    const dl  = Math.hypot(dx, dy) || 1;
    const dir = i % 2 === 0 ? 1 : -1;
    const cpx = (CX + s.x) / 2 + (-dy / dl * 50 * dir);
    const cpy = (CY + s.y) / 2 + ( dx / dl * 50 * dir);

    ctx1.beginPath();
    ctx1.moveTo(CX, CY);
    ctx1.quadraticCurveTo(cpx, cpy, s.x, s.y);
    const g = ctx1.createLinearGradient(CX, CY, s.x, s.y);
    g.addColorStop(0, 'rgba(93,202,165,0.55)');
    g.addColorStop(1, 'rgba(93,202,165,0)');
    ctx1.strokeStyle = g;
    ctx1.lineWidth = 2;
    ctx1.setLineDash([6, 8]);
    ctx1.lineDashOffset = -t * 26;
    ctx1.stroke();
    ctx1.setLineDash([]);

    // Packets flow from node inward toward PHOS
    s.packets.forEach(p => p.tick(s.x, s.y, CX, CY, cpx, cpy));
  });

  // PHOS: parallax + float (JS-controlled, no conflicting CSS animation)
  const floatY = Math.sin(t * (Math.PI / 3)) * 14;
  phosEl.style.transform = `translate3d(${-px}px,${-(floatY + py)}px,0)`;
}

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
function loop() {
  if (document.body.classList.contains('safe')) return;
  const t = Date.now() * 0.001;
  STARS.forEach(s => s.update());
  drawStarfield(t);
  drawMolecule(t);
  raf = requestAnimationFrame(loop);
}

// ── SAFE MODE ────────────────────────────────────────────────────────────────
document.getElementById('btn-safe').addEventListener('click', () => {
  const on = document.body.classList.toggle('safe');
  document.getElementById('btn-safe').textContent = on ? 'Restore Cage' : 'Safe Mode';
  if (on) {
    cancelAnimationFrame(raf);
    ctx0.clearRect(0, 0, W, H);
    ctx1.clearRect(0, 0, W, H);
    quieten();
  } else {
    resize(); loop();
    speak('Cage restored. Calcium coherence rebuilding.', 'var(--teal)');
    quieten(4000);
  }
});

// ── BOOT ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', resize);
resize();
loop();
speak('Ca₉(PO₄)₆ coherence stabilized. PHOS is listening.', 'var(--teal)');
quieten(5000);
</script>
