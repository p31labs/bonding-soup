<!DOCTYPE html>
<html lang="en" data-p31-appearance="hub">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>P31 | Phosphorus31 Operating System</title>
  <meta name="description" content="PHOS — Voice-first, inference-driven navigation for the P31 mesh. Gray Rock by default. Safe mode always available.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/p31-style.css">
  <style>
    :root {
      --p31-void: #0f1115;
      --p31-surface: #161920;
      --p31-surface2: #1c2028;
      --p31-cyan: #4db8a8;
      --p31-coral: #cc6247;
      --p31-butter: #cda852;
      --p31-lavender: #8b7cc9;
      --p31-phosphorus: #3ba372;
      --p31-cloud: #d8d6d0;
      --p31-muted: #6b7280;
      --p31-glass-border: rgba(255,255,255,0.08);
      --p31-font-sans: "Atkinson Hyperlegible", system-ui, sans-serif;
      --p31-font-mono: "JetBrains Mono", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--p31-void);
      color: var(--p31-cloud);
      font-family: var(--p31-font-sans);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    body.safe-mode {
      --p31-void: #000;
      --p31-surface: #0a0a0a;
      --p31-cloud: #fff;
    }
    body.safe-mode * { animation: none !important; transition: none !important; }
    
    /* Smart Starfield Background */
    #starfield-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.6;
    }
    body.safe-mode #starfield-canvas { display: none !important; }
    
    /* Safe Mode Toggle */
    .safe-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 9999;
      padding: 0.5rem 0.75rem;
      border: 1px solid rgba(204,98,71,0.3);
      border-radius: 6px;
      background: rgba(204,98,71,0.08);
      color: var(--p31-coral);
      font-family: var(--p31-font-mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 150ms;
    }
    .safe-toggle:hover { background: rgba(204,98,71,0.15); }
    .safe-toggle.active { background: rgba(204,98,71,0.25); border-color: var(--p31-coral); }
    
    /* Main Layout */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      min-height: calc(100vh - 200px);
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 2rem;
    }
    .logo svg {
      width: 100%;
      height: 100%;
      stroke: var(--p31-cyan);
      stroke-width: 2;
      fill: none;
      filter: drop-shadow(0 0 20px rgba(77,184,168,0.3));
    }
    
    h1 {
      font-family: var(--p31-font-mono);
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 500;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      color: var(--p31-cloud);
    }
    
    .subtitle {
      font-size: 1rem;
      color: var(--p31-muted);
      margin-bottom: 3rem;
      max-width: 450px;
    }
    
    /* Intent Grid */
    .intent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      max-width: 700px;
      width: 100%;
      margin-bottom: 2rem;
    }
    
    .intent-btn {
      background: rgba(22,25,32,0.8);
      border: 1px solid var(--p31-glass-border);
      border-radius: 12px;
      padding: 1.5rem 1rem;
      color: var(--p31-cloud);
      font-family: var(--p31-font-sans);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 200ms ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(4px);
    }
    .intent-btn:hover {
      background: var(--p31-surface2);
      border-color: var(--p31-cyan);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(77,184,168,0.15);
    }
    .intent-btn svg {
      width: 28px;
      height: 28px;
      stroke: var(--p31-cyan);
      stroke-width: 1.5;
      fill: none;
    }
    
    /* PHOS Direct Access Orb */
    .phos-direct {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 64px;
      height: 64px;
      background: rgba(22,25,32,0.9);
      border: 1px solid var(--p31-cyan);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(77,184,168,0.2);
      transition: all 0.3s ease;
      z-index: 10001;
      backdrop-filter: blur(4px);
    }
    .phos-direct:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px rgba(77,184,168,0.4);
    }
    .phos-direct svg {
      width: 32px;
      height: 32px;
      stroke: var(--p31-cyan);
      stroke-width: 2;
      fill: none;
    }
    
    /* Footer - Centered & Styled */
    footer {
      position: relative;
      z-index: 1;
      padding: 2rem;
      text-align: center;
      font-family: var(--p31-font-mono);
      font-size: 0.75rem;
      color: var(--p31-muted);
      border-top: 1px solid var(--p31-glass-border);
      background: rgba(15,17,21,0.5);
      backdrop-filter: blur(4px);
    }
    footer p {
      margin: 0.25rem 0;
      line-height: 1.8;
    }
    footer a {
      color: var(--p31-cyan);
      text-decoration: none;
      margin: 0 0.5rem;
      transition: color 150ms;
    }
    footer a:hover {
      color: var(--p31-butter);
      text-decoration: underline;
    }
    footer .commit {
      color: var(--p31-lavender);
      font-size: 0.7rem;
    }
    
    /* Mobile */
    @media (max-width: 600px) {
      .intent-grid { grid-template-columns: 1fr 1fr; }
      .phos-direct { bottom: 1rem; right: 1rem; width: 56px; height: 56px; }
      footer { padding: 1.5rem 1rem; }
    }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      #starfield-canvas { display: none !important; }
    }
  </style>
</head>
<body>
  <!-- Smart Starfield Canvas -->
  <canvas id="starfield-canvas"></canvas>
  
  <!-- Safe Mode Toggle -->
  <button class="safe-toggle" id="safeToggle" onclick="toggleSafeMode()">
    Safe Mode
  </button>
  
  <main>
    <!-- K4 Logo -->
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 100 100">
        <path d="M50 10 L20 85 L80 85 Z M50 10 L50 50 M20 85 L50 50 M80 85 L50 50"/>
      </svg>
    </div>
    
    <h1>PHOS</h1>
    <p class="subtitle">Phosphorus31 Operating System — Voice-first, inference-driven navigation for the mesh.</p>
    
    <!-- Direct Intent Navigation -->
    <div class="intent-grid" role="navigation" aria-label="Primary navigation">
      <button class="intent-btn" onclick="location.href='/cognitive-passport/index.html'">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/><path d="M12 12v10"/><path d="M12 12L2 7"/><path d="M12 12l10-5"/></svg>
        Cognitive Passport
      </button>
      <button class="intent-btn" onclick="location.href='/fleet-portal.html'">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
        Fleet Portal
      </button>
      <button class="intent-btn" onclick="location.href='/public/geodesic.html'">
        <svg viewBox="0 0 24 24"><path d="M12 2l10 17H2L12 2z"/></svg>
        Geodesic
      </button>
      <button class="intent-btn" onclick="location.href='/psych-e2e-live.html'">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10v4M10 10v4M14 10v4M18 10v4"/></svg>
        Psych E2E
      </button>
      <button class="intent-btn" onclick="location.href='/glass-box.html'">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Glass Box
      </button>
      <button class="intent-btn" onclick="location.href='/agents.html'">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
        Agents
      </button>
    </div>
    
    <p style="font-size: 0.8rem; color: var(--p31-muted); max-width: 500px;">
      WCD-PSYCH-MERGE-20260503 • 69 tests green • W-FLARE active • Bayesian routing
    </p>
  </main>
  
  <!-- PHOS Direct Access Orb -->
  <div class="phos-direct" onclick="activatePhos()" role="button" aria-label="Activate PHOS voice navigation">
    <svg viewBox="0 0 100 100">
      <path d="M50 15 L15 80 L85 80 Z M50 15 L50 55 M15 80 L50 55 M85 80 L50 55"/>
    </svg>
  </div>
  
  <!-- Centered Footer -->
  <footer>
    <p>
      <a href="/soup.html">C.A.R.S.</a>
      <a href="/psych-e2e-live.html">Live Testing</a>
      <a href="/docs/P31-PSYCHOLOGICAL-E2E-TESTING.md">Psych E2E Docs</a>
      <a href="/public/lib/p31-atmosphere-core.js">PHOS Core</a>
    </p>
    <p class="commit">
      P31 Labs — EIN 42-1888158 — commit 5f47d9c — Mesh Status: Online
    </p>
  </footer>
  
  <!-- PHOS Atmosphere Core -->
  <script src="/public/lib/p31-atmosphere-core.js"></script>
  <script>
    // Safe Mode Toggle
    function toggleSafeMode() {
      document.body.classList.toggle('safe-mode');
      const btn = document.getElementById('safeToggle');
      btn.classList.toggle('active');
      localStorage.setItem('p31_safe_mode', document.body.classList.contains('safe-mode'));
      
      // Hide/show starfield
      const starfield = document.getElementById('starfield-canvas');
      if (starfield) {
        starfield.style.display = document.body.classList.contains('safe-mode') ? 'none' : 'block';
      }
    }
    
    // Restore safe mode preference
    if (localStorage.getItem('p31_safe_mode') === 'true') {
      document.body.classList.add('safe-mode');
      document.getElementById('safeToggle').classList.add('active');
    }
    
    // PHOS Activation
    function activatePhos() {
      if (window.phosOS) {
        window.phosOS.toggle();
      } else {
        alert('PHOS v2.1 — Voice navigation initializing...');
      }
    }
    
    // Respect prefers-reduced-motion
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.body.classList.add('safe-mode');
    }
  </script>
  
  <!-- Smart Starfield Implementation -->
  <script type="module">
    const canvas = document.getElementById('starfield-canvas');
    if (!canvas || document.body.classList.contains('safe-mode')) {
      if (canvas) canvas.style.display = 'none';
    } else {
      try {
        // Dynamic import of starfield
        const { initStarfield } = await import('/design-assets/starfield/p31-starfield.js');
        
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        const STAR_COUNT = 150;
        const CONNECTION_DISTANCE = 100;
        const MAX_CONNECTIONS = 3;
        
        function resize() {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
        }
        
        function initStars() {
          stars = [];
          for (let i = 0; i < STAR_COUNT; i++) {
            stars.push({
              x: Math.random() * width,
              y: Math.random() * height,
              vx: (Math.random() - 0.5) * 0.3,
              vy: (Math.random() - 0.5) * 0.3,
              size: Math.random() * 1.5 + 0.5,
              alpha: Math.random() * 0.5 + 0.3,
              pulse: Math.random() * Math.PI * 2
            });
          }
        }
        
        function draw() {
          ctx.fillStyle = 'rgba(15, 17, 21, 0.3)';
          ctx.fillRect(0, 0, width, height);
          
          const time = Date.now() * 0.001;
          
          // Update and draw stars
          stars.forEach((star, i) => {
            // Update position
            star.x += star.vx;
            star.y += star.vy;
            star.pulse += 0.02;
            
            // Wrap around edges
            if (star.x < 0) star.x = width;
            if (star.x > width) star.x = 0;
            if (star.y < 0) star.y = height;
            if (star.y > height) star.y = 0;
            
            // Draw star with pulsing alpha
            const pulseAlpha = star.alpha + Math.sin(star.pulse) * 0.1;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(77, 184, 168, ${Math.max(0.1, pulseAlpha)})`;
            ctx.fill();
            
            // Draw connections (K4 mesh visualization)
            let connections = 0;
            for (let j = i + 1; j < stars.length && connections < MAX_CONNECTIONS; j++) {
              const other = stars[j];
              const dx = star.x - other.x;
              const dy = star.y - other.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              
              if (dist < CONNECTION_DISTANCE) {
                const alpha = (1 - dist / CONNECTION_DISTANCE) * 0.15;
                ctx.beginPath();
                ctx.moveTo(star.x, star.y);
                ctx.lineTo(other.x, other.y);
                ctx.strokeStyle = `rgba(77, 184, 168, ${alpha})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
                connections++;
              }
            }
          });
          
          requestAnimationFrame(draw);
        }
        
        // Handle resize
        window.addEventListener('resize', () => {
          resize();
          initStars();
        });
        
        // Pause when tab hidden
        document.addEventListener('visibilitychange', () => {
          if (document.hidden) {
            // Starfield pauses automatically with requestAnimationFrame
          }
        });
        
        // Initialize
        resize();
        initStars();
        draw();
        
        console.log('PHOS Starfield: K4 mesh visualization active');
      } catch (e) {
        console.log('Starfield disabled — Gray Rock fallback');
        canvas.style.display = 'none';
      }
    }
  </script>
</body>
</html>
