<!DOCTYPE html>
<html lang="en" data-p31-appearance="hub">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>P31 | Phosphorus31 Operating System</title>
  <meta name="description" content="PHOS — Voice-first, inference-driven navigation for the P31 mesh. Gray Rock by default. Safe mode always available.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --p31-void: #0f1115;
      --p31-surface: #161920;
      --p31-surface2: #1c2028;
      --p31-cyan: #4db8a8;
      --p31-coral: #cc6247;
      --p31-butter: #cda852;
      --p31-lavender: #8b7cc9;
      --p31-phosphorus: #3ba372;
      --p31-cloud: #d8d6d0;
      --p31-muted: #6b7280;
      --p31-glass-border: rgba(255,255,255,0.08);
      --p31-font-sans: "Atkinson Hyperlegible", system-ui, sans-serif;
      --p31-font-mono: "JetBrains Mono", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--p31-void);
      color: var(--p31-cloud);
      font-family: var(--p31-font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    body.safe-mode {
      --p31-void: #000;
      --p31-surface: #0a0a0a;
      --p31-cloud: #fff;
      animation: none !important;
    }
    body.safe-mode * { animation: none !important; transition: none !important; }
    
    .safe-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 9999;
      padding: 0.5rem 0.75rem;
      border: 1px solid rgba(204,98,71,0.3);
      border-radius: 6px;
      background: rgba(204,98,71,0.08);
      color: var(--p31-coral);
      font-family: var(--p31-font-mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      cursor: pointer;
    }
    .safe-toggle:hover { background: rgba(204,98,71,0.15); }
    
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 2rem;
    }
    .logo svg {
      width: 100%;
      height: 100%;
      stroke: var(--p31-cyan);
      stroke-width: 2;
      fill: none;
      filter: drop-shadow(0 0 20px rgba(77,184,168,0.3));
    }
    
    h1 {
      font-family: var(--p31-font-mono);
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 500;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      font-size: 1rem;
      color: var(--p31-muted);
      margin-bottom: 3rem;
      max-width: 400px;
    }
    
    .intent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      max-width: 800px;
      width: 100%;
      margin-bottom: 3rem;
    }
    
    .intent-btn {
      background: var(--p31-surface);
      border: 1px solid var(--p31-glass-border);
      border-radius: 12px;
      padding: 1.5rem 1rem;
      color: var(--p31-cloud);
      font-family: var(--p31-font-sans);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 200ms ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .intent-btn:hover {
      background: var(--p31-surface2);
      border-color: var(--p31-cyan);
      transform: translateY(-2px);
    }
    .intent-btn svg {
      width: 24px;
      height: 24px;
      stroke: var(--p31-cyan);
      stroke-width: 1.5;
      fill: none;
    }
    
    .phos-direct {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 64px;
      height: 64px;
      background: var(--p31-surface);
      border: 1px solid var(--p31-cyan);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(77,184,168,0.2);
      transition: all 0.3s ease;
      z-index: 10001;
    }
    .phos-direct:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px rgba(77,184,168,0.4);
    }
    .phos-direct svg {
      width: 32px;
      height: 32px;
      stroke: var(--p31-cyan);
      stroke-width: 2;
      fill: none;
    }
    
    footer {
      padding: 2rem;
      text-align: center;
      font-family: var(--p31-font-mono);
      font-size: 0.75rem;
      color: var(--p31-muted);
      border-top: 1px solid var(--p31-glass-border);
    }
    footer a { color: var(--p31-cyan); }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <button class="safe-toggle" onclick="document.body.classList.toggle('safe-mode')">
    Safe Mode
  </button>
  
  <main>
    <div class="logo">
      <svg viewBox="0 0 100 100">
        <path d="M50 10 L20 85 L80 85 Z M50 10 L50 50 M20 85 L50 50 M80 85 L50 50"/>
      </svg>
    </div>
    
    <h1>PHOS</h1>
    <p class="subtitle">Phosphorus31 Operating System — Voice-first, inference-driven navigation.</p>
    
    <div class="intent-grid">
      <button class="intent-btn" onclick="location.href='/cognitive-passport/index.html'">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/><path d="M12 12v10"/><path d="M12 12L2 7"/><path d="M12 12l10-5"/></svg>
        Cognitive Passport
      </button>
      <button class="intent-btn" onclick="location.href='/fleet-portal.html'">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
        Fleet Portal
      </button>
      <button class="intent-btn" onclick="location.href='/public/geodesic.html'">
        <svg viewBox="0 0 24 24"><path d="M12 2l10 17H2L12 2z"/></svg>
        Geodesic
      </button>
      <button class="intent-btn" onclick="location.href='/psych-e2e-live.html'">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10v4M10 10v4M14 10v4M18 10v4"/></svg>
        Psych E2E
      </button>
      <button class="intent-btn" onclick="location.href='/glass-box.html'">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Glass Box
      </button>
      <button class="intent-btn" onclick="location.href='/agents.html'">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
        Agents
      </button>
    </div>
    
    <p style="font-size: 0.8rem; color: var(--p31-muted);">
      WCD-PSYCH-MERGE-20260503 • 69 tests green • W-FLARE active
    </p>
  </main>
  
  <div class="phos-direct" onclick="alert('PHOS voice nav: Coming in v2.2')">
    <svg viewBox="0 0 100 100">
      <path d="M50 15 L15 80 L85 80 Z M50 15 L50 55 M15 80 L50 55 M85 80 L50 55"/>
    </svg>
  </div>
  
  <footer>
    <p>P31 Labs — <a href="/psych-e2e-live.html">Live Testing</a> — <a href="/public/lib/p31-atmosphere-core.js">PHOS Core</a></p>
  </footer>
  
  <script src="/public/lib/p31-atmosphere-core.js"></script>
  <script>
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.body.classList.add('safe-mode');
    }
  </script>
</body>
</html>
