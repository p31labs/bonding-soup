[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "p31-foundry"
version = "1.3.0"
description = "P31 Document Foundry — ingest, canonical records, local store, composable pipelines, event hooks."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "pypdf>=4.0,<6",
]

[project.optional-dependencies]
docx = ["python-docx>=1.0"]
dev = ["ruff>=0.4"]

[project.scripts]
p31-foundry = "p31_foundry.cli:entrypoint"

[tool.setuptools.packages.find]
where = ["src"]
