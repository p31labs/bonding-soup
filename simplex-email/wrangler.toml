# WCD-SIMPLEX-04 — inbound Email Worker (HERALD / tomograph path)
# Pair with Cloudflare Email Routing: route custom address → this Worker.
# Never commit secrets. `wrangler secret put MAIL_FORWARD_DESTINATION` with a verified destination.

name = "simplex-email"
main = "src/index.ts"
compatibility_date = "2025-03-03"

# Optional tomograph fan-out (set in dashboard or `wrangler vars`):
# SIMPLEX_INGEST_URL = https://<simplex-worker>/api/ingest/email
# Secret (same on both Workers): wrangler secret put SIMPLEX_EMAIL_INGEST_SECRET

[observability]
enabled = true
