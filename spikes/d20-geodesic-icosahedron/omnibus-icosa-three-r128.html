<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P31 Geodesic Sphere - D20</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; color: #00f3ff; font-family: monospace; }
        canvas { display: block; }
        #overlay { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .glass { background: rgba(0, 243, 255, 0.05); border: 1px solid rgba(0, 243, 255, 0.2); padding: 15px; border-radius: 8px; backdrop-filter: blur(5px); }
    </style>
</head>
<body>
    <div id="overlay" class="glass">
        <h1 style="margin:0; font-size: 1.2rem;">P31 D20 CORE</h1>
        <p style="font-size: 0.7rem; opacity: 0.7;">ROTATE & CLICK FACES TO DECRYPT</p>
    </div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Icosahedron (20 faces)
        const geometry = new THREE.IcosahedronGeometry(2, 0);
        const material = new THREE.MeshPhysicalMaterial({
            color: 0x050510, metalness: 0.9, roughness: 0.1,
            transparent: true, opacity: 0.9, side: THREE.DoubleSide, flatShading: true
        });
        const icosahedron = new THREE.Mesh(geometry, material);
        scene.add(icosahedron);

        // Cyan Wireframe
        const wireframe = new THREE.LineSegments(
            new THREE.EdgesGeometry(geometry),
            new THREE.LineBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.5 })
        );
        icosahedron.add(wireframe);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const light = new THREE.PointLight(0x00f3ff, 2, 10);
        light.position.set(5, 5, 5);
        scene.add(light);

        camera.position.z = 6;

        let isDragging = false, previousMousePosition = { x: 0, y: 0 };
        window.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaMove = { x: e.clientX - previousMousePosition.x, y: e.clientY - previousMousePosition.y };
            icosahedron.rotation.y += deltaMove.x * 0.01;
            icosahedron.rotation.x += deltaMove.y * 0.01;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        // Click Detection
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(icosahedron);
            if (intersects.length > 0) {
                console.log("Face Clicked:", intersects[0].faceIndex);
                wireframe.material.color.setHex(0xffbf00); // Flash Gold
                setTimeout(() => wireframe.material.color.setHex(0x00f3ff), 200);
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (!isDragging) { icosahedron.rotation.y += 0.005; icosahedron.rotation.x += 0.002; }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
