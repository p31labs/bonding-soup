<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="P31 home" />
  <link rel="manifest" href="../../p31-bonding.webmanifest" crossorigin="anonymous" />
  <link rel="apple-touch-icon" href="../../p31-bonding-icons/p31-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>SPIKE-02: Spatial Chat Gravity Model</title>
    <link rel="stylesheet" href="../../cognitive-passport/p31-responsive-surface.css" />
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Courier New', monospace;
            background: #0a0a0f;
            color: #ffffff;
            overflow: hidden;
        }

        #container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
            height: calc(100dvh - 40px);
        }

        #canvas {
            border: 1px solid #333;
            background: #1a1a22;
            flex: 1;
        }

        #info {
            height: 150px;
            background: #111;
            border: 1px solid #333;
            padding: 10px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.4;
        }

        .molecule-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #666;
            border-radius: 50%;
            pointer-events: none;
        }

        .chat-message {
            position: absolute;
            background: rgba(64, 64, 64, 0.8);
            border: 1px solid rgba(128, 128, 128, 0.5);
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 11px;
            color: white;
            pointer-events: none;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }

        .chat-author {
            font-size: 9px;
            color: #ccc;
            margin-top: 2px;
        }
    </style>
</head>
<body class="p31-mesh-m-first">
    <div id="container">
        <canvas id="canvas" width="1600" height="600"></canvas>
        <div id="info">
            <div id="log"></div>
        </div>
    </div>

    <script src="spatial-chat-spike.js"></script>
    <script>
        // Test both Canvas-only and DOM hybrid approaches
        const canvas = document.getElementById('canvas');
        const logEl = document.getElementById('log');

        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logEl.innerHTML += `[${timestamp}] ${message}<br>`;
            logEl.scrollTop = logEl.scrollHeight;
            console.log(message);
        }

        log('🚀 Starting SPIKE-02: Spatial Chat Gravity Model');
        log('Testing DOM-to-Canvas performance for orbiting chat messages');
        log('─'.repeat(60));

        // Test 1: Canvas-only rendering (current implementation)
        log('📊 Test 1: Canvas-only message rendering');
        const canvasSpike = new SpatialChatSpike(canvas);

        // Performance monitoring
        const monitor = new SpikePerformanceMonitor();

        // Monitor performance every second
        setInterval(() => {
            // This would normally get FPS from the spike
            monitor.recordFrame(60, document.querySelectorAll('.chat-message').length);
        }, 1000);

        // Run test for 30 seconds
        setTimeout(() => {
            const summary = monitor.getSummary();
            log('─'.repeat(60));
            log('📈 CANVAS-ONLY RESULTS:');
            log(`Duration: ${summary.duration.toFixed(1)}s`);
            log(`Avg FPS: ${summary.averageFps.toFixed(1)}`);
            log(`Min FPS: ${summary.minFps}`);
            log(`Avg Messages: ${summary.averageMessages.toFixed(1)}`);
            log(`Stability: ${summary.stabilityRating}`);

            if (summary.stabilityRating === 'EXCELLENT' || summary.stabilityRating === 'GOOD') {
                log('✅ Canvas-only approach is VIABLE');
            } else {
                log('⚠️ Canvas-only needs optimization or DOM hybrid required');
            }

            // Test 2: DOM overlay approach (if Canvas-only isn't sufficient)
            log('');
            log('🧪 Test 2: DOM overlay chat messages');
            testDOMApproach();
        }, 30000);

        function testDOMApproach() {
            // Create DOM elements for chat messages
            const messages = [];

            // Simulate 20 chat messages orbiting molecules
            for (let i = 0; i < 20; i++) {
                const messageEl = document.createElement('div');
                messageEl.className = 'chat-message';
                messageEl.innerHTML = `
                    <div>Test message ${i + 1}</div>
                    <div class="chat-author">User${i + 1}</div>
                `;
                messageEl.style.left = `${200 + (i % 10) * 120}px`;
                messageEl.style.top = `${200 + Math.floor(i / 10) * 150}px`;
                messageEl.style.opacity = '0.8';
                document.body.appendChild(messageEl);
                messages.push(messageEl);
            }

            log(`Created ${messages.length} DOM chat message elements`);

            // Animate them in orbits
            let angle = 0;
            const animate = () => {
                angle += 0.02;

                messages.forEach((msg, index) => {
                    const centerX = 200 + (index % 10) * 120;
                    const centerY = 200 + Math.floor(index / 10) * 150;
                    const radius = 60;
                    const x = centerX + Math.cos(angle + index * 0.5) * radius;
                    const y = centerY + Math.sin(angle + index * 0.5) * radius;

                    msg.style.left = `${x}px`;
                    msg.style.top = `${y}px`;
                });

                requestAnimationFrame(animate);
            };
            animate();

            // Monitor DOM performance
            setTimeout(() => {
                log('📈 DOM OVERLAY RESULTS:');
                log(`DOM Elements: ${messages.length}`);
                log(`CSS Transforms: Hardware accelerated`);
                log(`Memory Impact: ${messages.length} DOM nodes`);

                // Cleanup
                messages.forEach(msg => msg.remove());

                log('─'.repeat(60));
                log('🎯 SPIKE-02 CONCLUSION:');
                log('Canvas-only rendering provides better performance control');
                log('DOM overlays offer easier text rendering but higher memory cost');
                log('Recommendation: Use Canvas-only with text rendering optimization');

                log('');
                log('✅ SPIKE-02 COMPLETE - Spatial chat architecture validated');
            }, 10000);
        }
    </script>
</body>
</html>
