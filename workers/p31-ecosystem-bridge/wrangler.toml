# P31 Ecosystem Bridge — cross-site nervous system
# Provides CORS-safe /health, /api/sync, /api/status for both sites.
# Deploy: wrangler deploy --config workers/p31-ecosystem-bridge/wrangler.toml
# Canonical URL: p31-constants.json mesh.ecosystemBridgeWorkerUrl

name = "p31-ecosystem-bridge"
main = "src/index.ts"
compatibility_date = "2025-10-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
WORKER_VERSION = "1.0.0"
# Canonical origins served — must stay in sync with ALLOWED_ORIGINS in src/index.ts
PHOS_ORIGIN = "https://phosphorus31.org"
P31CA_ORIGIN = "https://p31ca.org"
